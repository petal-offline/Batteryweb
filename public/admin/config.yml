backend:
  name: github
  repo: petal-offline/Batteryweb
  branch: main
  base_url: https://thekcel.com
  auth_endpoint: /api/auth

local_backend: true

media_folder: "public/uploads/product-images"
public_folder: "/uploads/product-images"
site_url: https://thekcel.com
display_url: https://thekcel.com
logo_url: /images/battery-cells-lab.png

collections:
  - name: products
    label: Products
    label_singular: Product
    folder: content/products
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{category}} - {{name}} - {{stockStatus}}"
    editor:
      preview: false
    fields:
      - label: Product Name
        name: name
        widget: string
      - label: Category
        name: category
        widget: select
        options:
          - NMC
          - LFP
      - label: Product Description
        name: description
        widget: text
      - label: Image Upload
        name: image
        widget: image
        choose_url: false
        allow_multiple: false
        default: /images/battery-cells-lab.png
        hint: Upload one static JPG, JPEG, PNG, or WebP product photo. Keep the file under 5 MB.
        media_library:
          config:
            multiple: false
            max_file_size: 5242880
      - label: Voltage
        name: voltage
        widget: string
        hint: "Example: 3.2V"
      - label: Capacity
        name: capacity
        widget: string
        hint: "Example: 100Ah or 5000mAh"
      - label: Price
        name: price
        widget: string
        required: false
        hint: Use exact pricing, a range, or text such as "Contact for Quote".
      - label: Stock Status
        name: stockStatus
        widget: select
        options:
          - In Stock
          - Out of Stock
      - label: Sort Order
        name: sortOrder
        widget: number
        value_type: int
        min: 1
        default: 10
      - label: Specifications
        name: specifications
        widget: list
        summary: "{{fields.label}}: {{fields.value}}"
        fields:
          - label: Specification Name
            name: label
            widget: string
          - label: Specification Value
            name: value
            widget: string
